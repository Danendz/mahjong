services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mahjong
      POSTGRES_USER: mahjong
      POSTGRES_PASSWORD: mahjong_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahjong"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://mahjong:mahjong_dev@postgres:5432/mahjong?sslmode=disable
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  pgdata:
